    /* boot loader — inline so it paints before any bundle loads */
    html{background:#05070a}
    #loader{position:fixed;inset:0;z-index:900;display:flex;align-items:center;justify-content:center;
      background:#05070a;transition:opacity .6s ease}
    #loader.done{opacity:0;pointer-events:none}
    #loader span{font-family:"Century Gothic","Jost",system-ui,sans-serif;font-size:.66rem;
      letter-spacing:.34em;padding-left:.34em;text-transform:uppercase;color:rgba(255,255,255,.62);
      animation:ldpulse 1.5s ease-in-out infinite alternate}
    #loader{flex-direction:column;gap:22px}
    #loader .ld-bar{display:block;width:min(320px,56vw);height:1px;background:rgba(255,255,255,.14)}
    #loader .ld-bar b{display:block;width:0%;height:100%;background:#d6b46a;transition:width .35s ease}
    #loader .ld-pct{font-family:"Century Gothic","Jost",system-ui,sans-serif;font-size:.6rem;
      letter-spacing:.3em;color:rgba(214,180,106,.9)}
    @keyframes ldpulse{from{opacity:.4}to{opacity:1}}
    @media (prefers-reduced-motion: reduce){#loader span{animation:none}}
  </style>
